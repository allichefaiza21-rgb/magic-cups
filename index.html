<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>إحساس AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="btn" style="position:fixed; z-index:999; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px; background:gold; border-radius:50px; font-weight:bold; cursor:pointer; font-family:sans-serif; box-shadow: 0 0 20px rgba(0,0,0,0.5);" onclick="start()">
        ✨ ابدأ تجربة إحساس ✨
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <a-assets>
            <video id="vid" src="https://res.cloudinary.com/dpi02iabl/video/upload/v1741731262/welcome_xq4jrk.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-marker type="barcode" value="0">
            <a-video src="#vid" width="2" height="2" rotation="-90 0 0" position="0 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function start() {
            var v = document.querySelector('#vid');
            v.play();
            document.getElementById('btn').style.display = 'none';
        }
    </script>
</body>
</html>
